<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }

    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;

  .wrap { width: 100%; max-width: 440px; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 36px 32px;
    box-shadow: 0 8px 28px rgba(28, 35, 51, 0.07);

  h1 { font-size: 21px; font-weight: 700; letter-spacing: -0.02em; }
  .desc { margin-top: 8px; font-size: 14px; color: var(--sub); line-height: 1.6; }
  form { margin-top: 26px; display: flex; flex-direction: column; gap: 16px; }
  label { font-size: 13px; font-weight: 600; color: var(--sub); display: block; margin-bottom: 6px; }
  input {
    width: 100%;
    font-size: 16px;
    padding: 12px 14px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    outline: none;
    transition: border-color .15s;
    background: #fbfcfe;
  }
  input:focus { border-color: var(--accent); background: #fff; }
  button[type=submit] {
    margin-top: 6px;
    font-size: 16px;
    font-weight: 700;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    transition: background .15s;
  }
  button[type=submit]:hover { background: var(--accent-dark); }
  .result { margin-top: 20px; display: none; }
  .result.show { display: block; }
  .ok {
    background: var(--ok-bg);
    border: 1px solid var(--ok-line);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }
  .ok .who { font-size: 15px; font-weight: 700; }
  .ok .msg { margin-top: 4px; font-size: 13px; color: var(--sub); }
  .ok a.go {
    display: block;
    margin-top: 14px;
    padding: 13px;
    border-radius: 10px;
    background: #2e7d4f;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    transition: filter .15s;
  }
  .ok a.go:hover { filter: brightness(1.08); }
  .err-box {
    background: var(--err-bg);
    border: 1px solid #f0c6c0;
    border-radius: 12px;
    padding: 16px 18px;
    color: var(--err);
    font-size: 14px;
    line-height: 1.6;
  }
  .foot { margin-top: 18px; text-align: center; font-size: 12px; color: #9aa2b5; line-height: 1.6; }
</style>
